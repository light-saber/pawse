<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pawse 🐾 — a calm little corner with your dog</title>
  <meta name="description" content="Pawse: take a little break and give your dog a treat. A relaxing, no-pressure web toy." />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>" />
</head>
<body>
  <main id="app">

    <!-- ===== Start screen ===== -->
    <section id="start-screen" class="screen">
      <div class="card">
        <div class="logo">🐾</div>
        <h1>Pawse</h1>
        <p class="tagline">Take a little pause. Give your dog a treat.</p>

        <form id="name-form" autocomplete="off">
          <label for="pet-name">What's your dog's name?</label>
          <input id="pet-name" name="pet-name" type="text" maxlength="20"
                 placeholder="e.g. Biscuit" required />
          <div class="suggestions" id="suggestions" aria-hidden="true"></div>
          <button type="submit" class="btn-primary">Meet your dog</button>
        </form>
      </div>
      <footer class="credit">A quiet thing to do with your hands. No score, no rush.</footer>
    </section>

    <!-- ===== Play screen ===== -->
    <section id="play-screen" class="screen hidden">
      <header class="play-header">
        <h2 id="dog-name">Buddy</h2>
        <button id="menu-btn" class="icon-btn" title="Options" aria-label="Options">⚙︎</button>
      </header>

      <div class="stage">
        <div id="scene"></div>
        <div id="hearts-layer" class="hearts-layer" aria-hidden="true"></div>
      </div>


      <p id="mood" class="mood">…</p>

      <div class="treat-area">
        <button id="treat-btn" class="btn-treat">
          <span class="treat-emoji">🦴</span>
          <span class="treat-label">Give a treat</span>
        </button>
        <p id="cooldown" class="cooldown" aria-live="polite"></p>
      </div>

      <p class="counter">Treats shared together: <span id="treat-count">0</span></p>
    </section>

    <!-- ===== Options dialog ===== -->
    <div id="menu" class="menu hidden" role="dialog" aria-modal="true">
      <div class="menu-card">
        <h3>Options</h3>
        <button id="sound-toggle" class="menu-item">🔊 Sound: On</button>
        <button id="rename-btn" class="menu-item">✏️ Rename your dog</button>
        <button id="new-dog-btn" class="menu-item">🐶 Start with a new dog</button>
        <button id="close-menu" class="menu-item subtle">Close</button>
      </div>
    </div>

  </main>

  <script src="pixeldog.js"></script>
  <script src="script.js"></script>
</body>
</html>
